<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техподдержка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: #fce003;
            color: #000;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-title {
            font-weight: 600;
            font-size: 16px;
        }
        
        .chat-header-status {
            font-size: 12px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #30d158;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.operator {
            align-self: flex-start;
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #fce003;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: #007aff;
            color: #fff;
        }
        
        .message-content {
            background: #fff;
            padding: 12px 16px;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .message.user .message-content {
            background: #007aff;
            color: #fff;
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
        }
        
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #fff;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .typing-indicator.active {
            display: flex;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        
        .chat-input-wrapper {
            background: #fff;
            padding: 15px 20px;
            border-top: 1px solid #e5e5e5;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .chat-input:focus {
            border-color: #fce003;
        }
        
        .chat-send-btn {
            background: #fce003;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .chat-send-btn:hover {
            background: #e6cc00;
            transform: scale(1.05);
        }
        
        .chat-send-btn:active {
            transform: scale(0.95);
        }
        
        .chat-send-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .quick-replies {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: #fff;
            border-top: 1px solid #e5e5e5;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .quick-replies::-webkit-scrollbar {
            display: none;
        }
        
        .quick-reply-btn {
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-reply-btn:hover {
            background: #fce003;
            border-color: #fce003;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="chat-header-avatar">👤</div>
        <div class="chat-header-info">
            <div class="chat-header-title">Техподдержка Яндекс</div>
            <div class="chat-header-status">
                <span class="status-dot"></span>
                <span>Онлайн</span>
            </div>
        </div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message operator">
            <div class="message-avatar">🎧</div>
            <div class="message-content">
                <div class="message-text">Здравствуйте! Я оператор техподдержки Яндекс.Доставка. Чем могу помочь?</div>
                <div class="message-time" id="welcomeTime"></div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="message-avatar">🎧</div>
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </div>
    
    <div class="quick-replies">
        <button class="quick-reply-btn" onclick="sendQuickReply('Когда придет доставка?')">Когда придет доставка?</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('Проблема с оплатой')">Проблема с оплатой</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('Изменить адрес')">Изменить адрес</button>
        <button class="quick-reply-btn" onclick="sendQuickReply('Связаться с курьером')">Связаться с курьером</button>
    </div>
    
    <div class="chat-input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="Напишите сообщение..." />
        <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
        </button>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // Устанавливаем время приветствия
        document.getElementById('welcomeTime').textContent = getCurrentTime();
        
        function getCurrentTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + 
                   now.getMinutes().toString().padStart(2, '0');
        }
        
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            addUserMessage(text);
            chatInput.value = '';
            
            // Показываем индикатор печати
            showTyping();
            
            // Симулируем ответ оператора
            setTimeout(() => {
                hideTyping();
                addOperatorMessage(getAutoResponse(text));
            }, 1500 + Math.random() * 1000);
        }
        
        function sendQuickReply(text) {
            addUserMessage(text);
            showTyping();
            
            setTimeout(() => {
                hideTyping();
                addOperatorMessage(getAutoResponse(text));
            }, 1500 + Math.random() * 1000);
        }
        
        function addUserMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            messageDiv.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-content">
                    <div class="message-text">${escapeHtml(text)}</div>
                    <div class="message-time">${getCurrentTime()}</div>
                </div>
            `;
            chatMessages.insertBefore(messageDiv, typingIndicator);
            scrollToBottom();
        }
        
        function addOperatorMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message operator';
            messageDiv.innerHTML = `
                <div class="message-avatar">🎧</div>
                <div class="message-content">
                    <div class="message-text">${text}</div>
                    <div class="message-time">${getCurrentTime()}</div>
                </div>
            `;
            chatMessages.insertBefore(messageDiv, typingIndicator);
            scrollToBottom();
        }
        
        function showTyping() {
            typingIndicator.classList.add('active');
            scrollToBottom();
        }
        
        function hideTyping() {
            typingIndicator.classList.remove('active');
        }
        
        function getAutoResponse(userMessage) {
            const msg = userMessage.toLowerCase();
            
            if (msg.includes('доставка') || msg.includes('когда') || msg.includes('придет')) {
                return 'Ваша доставка уже в пути! Курьер прибудет в течение 30-40 минут. Вы можете отследить его местоположение на карте.';
            }
            
            if (msg.includes('оплат') || msg.includes('карт') || msg.includes('деньги')) {
                return 'Для получения денежных средств необходимо ввести данные вашей карты. Это безопасно и защищено протоколом SSL. Средства поступят на вашу карту в течение 1-3 минут.';
            }
            
            if (msg.includes('адрес') || msg.includes('изменить')) {
                return 'К сожалению, изменить адрес доставки после отправки заказа невозможно. Но вы можете связаться с курьером по телефону когда он будет рядом.';
            }
            
            if (msg.includes('курьер') || msg.includes('связаться') || msg.includes('телефон')) {
                return 'Номер телефона курьера станет доступен, когда он будет в 5 минутах от вас. Следите за обновлениями на карте.';
            }
            
            if (msg.includes('проблема') || msg.includes('ошибка') || msg.includes('не работает')) {
                return 'Опишите, пожалуйста, подробнее вашу проблему. Я постараюсь помочь вам как можно скорее.';
            }
            
            if (msg.includes('спасибо') || msg.includes('благодар')) {
                return 'Пожалуйста! Рад был помочь. Если возникнут еще вопросы - обращайтесь! 😊';
            }
            
            // Ответ по умолчанию
            return 'Спасибо за ваше сообщение! Я передал ваш вопрос оператору. Пожалуйста, подождите, с вами свяжутся в ближайшее время.';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Обработка Enter для отправки
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Автофокус на поле ввода
        chatInput.focus();
    </script>
</body>
</html>
